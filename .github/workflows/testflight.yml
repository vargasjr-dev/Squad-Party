name: TestFlight Build & Upload

# Triggers when Swift source code changes on main.
# Builds the iOS app and uploads to TestFlight for beta testing.
# Requires Apple signing secrets to be configured in GitHub.
on:
  push:
    branches:
      - main
    paths:
      - "ios/**"
      - ".github/workflows/testflight.yml"
  workflow_dispatch:

concurrency:
  group: testflight
  cancel-in-progress: true

jobs:
  build-and-upload:
    name: Build & Upload to TestFlight
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Skip if secrets not configured yet
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "⚠️ Apple signing secrets not configured — skipping certificate install"
            echo "SIGNING_AVAILABLE=false" >> $GITHUB_ENV
            exit 0
          fi

          echo "SIGNING_AVAILABLE=true" >> $GITHUB_ENV

          # Create temporary keychain
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Resolve Swift packages
        working-directory: ios/SquadParty
        run: |
          swift package resolve

      - name: Build (compile check)
        working-directory: ios/SquadParty
        run: |
          xcodebuild build \
            -scheme SquadParty \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

      - name: Build archive (when signing available)
        if: env.SIGNING_AVAILABLE == 'true'
        working-directory: ios/SquadParty
        run: |
          xcodebuild archive \
            -scheme SquadParty \
            -configuration Release \
            -archivePath $RUNNER_TEMP/SquadParty.xcarchive \
            -sdk iphoneos \
            -skipPackagePluginValidation

      - name: Export IPA
        if: env.SIGNING_AVAILABLE == 'true'
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/SquadParty.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to TestFlight
        if: env.SIGNING_AVAILABLE == 'true'
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/SquadParty.ipa \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Clean up keychain
        if: always() && env.SIGNING_AVAILABLE == 'true'
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

      - name: Summary
        run: |
          if [ "$SIGNING_AVAILABLE" = "true" ]; then
            echo "✅ Built and uploaded to TestFlight"
          else
            echo "✅ Build check passed (signing secrets not yet configured)"
            echo "To enable TestFlight uploads, add these secrets:"
            echo "  - BUILD_CERTIFICATE_BASE64"
            echo "  - P12_PASSWORD"
            echo "  - BUILD_PROVISION_PROFILE_BASE64"
            echo "  - KEYCHAIN_PASSWORD"
            echo "  - ASC_KEY_ID"
            echo "  - ASC_ISSUER_ID"
            echo "  - ASC_PRIVATE_KEY"
          fi
